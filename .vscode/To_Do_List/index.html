<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    .app{
      width:420px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      padding:25px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .top h2{
      font-size:28px;
    }

    .count{
      background:#22c55e;
      width:35px;
      height:35px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      font-weight:bold;
    }

    .input-area{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .input-area input{
      flex:1;
      padding:14px;
      border:none;
      border-radius:12px;
      outline:none;
      background:#111827;
      color:white;
      font-size:15px;
    }

    .input-area button{
      width:55px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:22px;
      cursor:pointer;
      transition:0.3s;
    }

    .input-area button:hover{
      transform:scale(1.05);
    }

    .tasks{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .task{
      background:#111827;
      padding:15px;
      border-radius:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      animation:show 0.3s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .task p{
      width:70%;
      word-break:break-word;
    }

    .task.completed p{
      text-decoration:line-through;
      opacity:0.5;
    }

    .btns{
      display:flex;
      gap:8px;
    }

    .btns button{
      border:none;
      padding:8px 10px;
      border-radius:8px;
      color:white;
      cursor:pointer;
      font-size:14px;
    }

    .check{
      background:#22c55e;
    }

    .remove{
      background:#ef4444;
    }
  </style>
</head>
<body>

  <div class="app">

    <div class="top">
      <h2>My Tasks</h2>
      <div class="count" id="count">0</div>
    </div>

    <div class="input-area">
      <input type="text" id="input" placeholder="Add a task...">
      <button onclick="addTask()">+</button>
    </div>

    <div class="tasks" id="tasks"></div>

  </div>

  <script>

    const input = document.getElementById("input");
    const tasks = document.getElementById("tasks");
    const count = document.getElementById("count");

    let total = 0;

    function updateCount(){
      count.innerText = total;
    }

    function addTask(){

      const text = input.value.trim();

      if(text === "") return;

      const div = document.createElement("div");
      div.classList.add("task");

      div.innerHTML = `
        <p>${text}</p>

        <div class="btns">
          <button class="check">Done</button>
          <button class="remove">Delete</button>
        </div>
      `;

      const checkBtn = div.querySelector(".check");
      const removeBtn = div.querySelector(".remove");

      checkBtn.onclick = () => {
        div.classList.toggle("completed");
      };

      removeBtn.onclick = () => {
        div.remove();
        total--;
        updateCount();
      };

      tasks.appendChild(div);

      total++;
      updateCount();

      input.value = "";
    }

    input.addEventListener("keydown",(e)=>{
      if(e.key === "Enter"){
        addTask();
      }
    });

  </script>

</body>
</html>
